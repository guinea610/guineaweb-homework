    <article class="story-card">
        
        <h1 class="card-title">灰常想鼠</h1>
        <p class="card-subtitle">那些被小小生命治癒的日子</p>
        
        <div class="image-wrapper">
            <img class="main-image" src="https://raw.githubusercontent.com/guinea610/guineaweb-homework/refs/heads/main/images/%E5%B0%8F%E7%81%B03.jpg" alt="可愛小灰">
        </div>
        <span class="image-caption">可愛小灰在吃好吃菜菜/2025.01.19</span>
        
        <p class="card-content">
           認識我的人都知道，我真的非常非常喜歡天竺鼠。天竺鼠的出現幾乎是改變了我的人生，他們陪我度過了就學時期每個焦慮、辛苦的時刻。即使牠們不會說話，卻用最單純的方式治癒了我，聽著牠們討時的叫聲、在籠子裡跑來跑去的聲音，或是看著牠們吃菜菜、睡覺、一動不動，只要感受到天竺鼠的存在，就會覺得好幸福(哭了)
        </p>
        
        <footer class="card-footer">
            Designed by 610 • 2026.05.30
        </footer>

    </article>
